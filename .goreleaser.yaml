version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pi
    binary: pi
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/dimetron/pi-go/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dimetron
    name: pi-go
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
